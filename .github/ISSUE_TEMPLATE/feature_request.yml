name: Feature request
description: Suggest a new mechanism, correlation, or capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or limitation are you trying to address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Sketch the equation, mechanism, or API. Cite the source paper or standard.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Why this approach over other options.

  - type: textarea
    id: references
    attributes:
      label: References
      description: Papers, standards, or prior art (DOI when available).
