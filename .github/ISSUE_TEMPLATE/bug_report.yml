name: Bug report
description: Numerical mismatch, crash, or unexpected output
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail to reproduce.

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.5"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 14"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproducing snippet
      description: Paste the smallest piece of code that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs observed
      description: What did you expect to happen, and what actually happened? Include numerical values if relevant.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Stack trace, logs, plots, anything that helps.
