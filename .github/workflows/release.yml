name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify artifacts
        run: ls -la dist/

      - name: Extract version from tag
        id: vsn
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.vsn.outputs.version }}"
          python - <<PY
          import re, pathlib
          v = "${VERSION}"
          txt = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(rf"## \[{re.escape(v)}\][^\n]*\n(.*?)(?=\n## \[|\Z)", txt, re.S)
          notes = m.group(1).strip() if m else f"Release v{v}"
          pathlib.Path("RELEASE_NOTES.md").write_text(notes, encoding="utf-8")
          PY
          cat RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.vsn.outputs.version }}"
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
